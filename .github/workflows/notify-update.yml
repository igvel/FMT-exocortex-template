name: Notify Template Update

# Ежедневно в 7:28 MSK (4:28 UTC) проверяет коммиты за 24ч
# и отправляет дайджест в Telegram-канал.
# Также можно запустить вручную для тестирования.

on:
  schedule:
    - cron: '28 4 * * *'  # 7:28 MSK
  workflow_dispatch:       # ручной запуск для тестирования

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # нужна полная история для git log

      - name: Check for recent commits
        id: check
        run: |
          COMMITS=$(git log --since="24 hours ago" --oneline 2>/dev/null)
          if [ -z "$COMMITS" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No commits in the last 24 hours"
          else
            COMMIT_COUNT=$(echo "$COMMITS" | wc -l | tr -d ' ')
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "commit_count=$COMMIT_COUNT" >> "$GITHUB_OUTPUT"
            echo "$COMMIT_COUNT commits found"
          fi

      - name: Extract changelog entry
        if: steps.check.outputs.has_changes == 'true'
        id: changelog
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo "entry=Нет CHANGELOG.md" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract version header and content between first and second ## headings
          VERSION=$(grep -m1 '^## \[' CHANGELOG.md | sed 's/## //')
          ENTRY=$(sed -n '/^## \[/{n; :loop; /^## \[/q; p; n; b loop}' CHANGELOG.md | head -30)

          # Write to file to preserve newlines
          echo "$VERSION" > /tmp/changelog_version.txt
          echo "$ENTRY" > /tmp/changelog_entry.txt

      - name: Send Telegram notification
        if: steps.check.outputs.has_changes == 'true'
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          VERSION=$(cat /tmp/changelog_version.txt)
          ENTRY=$(cat /tmp/changelog_entry.txt)
          COMMIT_COUNT="${{ steps.check.outputs.commit_count }}"

          # Format message for Telegram (HTML parse mode for better formatting)
          MESSAGE="🔄 <b>Exocortex Template ${VERSION}</b>

${COMMIT_COUNT} коммит(ов) за последние 24ч

${ENTRY}

<b>Обновить:</b>
• Терминал: <code>bash update.sh</code>
• AI CLI: <i>«обнови мой экзокортекс»</i>
• Проверить: <code>bash update.sh --check</code>"

          # Send message
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="HTML" \
            --data-urlencode "text=${MESSAGE}" \
            -o /tmp/tg_response.json

          # Check response
          if jq -e '.ok' /tmp/tg_response.json > /dev/null 2>&1; then
            echo "✓ Telegram notification sent"
          else
            echo "✗ Failed to send notification:"
            cat /tmp/tg_response.json
            exit 1
          fi
